name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
    include:
      - target: x86_64-unknown-linux-gnu
        os: ubuntu-latest
      - target: aarch64-unknown-linux-gnu
        os: ubuntu-24.04-arm
      - target: x86_64-apple-darwin
        os: macos-15-intel
      - target: aarch64-apple-darwin
        os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --workspace
      - name: Package
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/xtask out/
          cp LICENSE README.md out/
          cd out && tar cJf ../agentd-${{ github.ref_name }}-${{ matrix.target }}.tar.xz *
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentd-${{ matrix.target }}
          path: agentd-${{ github.ref_name }}-${{ matrix.target }}.tar.xz

  publish:
    name: publish + release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate SHA256SUMS
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      - name: Publish to crates.io
        run: |
          cargo install release-plz
          release-plz publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
